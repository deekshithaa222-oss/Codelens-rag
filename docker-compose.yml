version: '3.8'

services:
  # Ollama LLM service (self-hosted, offline)
  ollama:
    image: ollama/ollama:latest
    container_name: codelens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: serve

  # CodeLens Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codelens-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # CodeLens Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: codelens-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    depends_on:
      - backend
    volumes:
      - .:/app
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  ollama_data:
